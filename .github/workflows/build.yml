name: Build

on:
  push:
    branches: [master]
    paths:
      - 'zkui-frontend/**'
  pull_request:
    branches: [master]
    paths:
      - 'zkui-frontend/**'
  workflow_dispatch:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: zkui-frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd zkui-frontend
          npm ci

      - name: Lint
        run: |
          cd zkui-frontend
          npm run lint

      - name: Build
        run: |
          cd zkui-frontend
          npm run build

  android:
    needs: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: zkui-frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd zkui-frontend
          npm ci

      - name: Build web
        run: |
          cd zkui-frontend
          npm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > zkui-frontend/android/local.properties

      - name: Build Android APK
        run: |
          cd zkui-frontend
          npx cap sync android
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: zkui-frontend/android/app/build/outputs/apk/debug/app-debug.apk

  ios:
    needs: web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: zkui-frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd zkui-frontend
          npm ci

      - name: Build web
        run: |
          cd zkui-frontend
          npm run build

      - name: Setup iOS
        run: |
          cd zkui-frontend
          npx cap sync ios

      - name: Build iOS
        run: |
          cd zkui-frontend/ios/App
          xcodebuild -scheme App -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 16' build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: zkui-frontend/ios/App/build
